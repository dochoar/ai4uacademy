<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 4U Academy</title>
    <meta name="description" content="AI 4U Academy Educational Platform">

    <!-- Fonts: Fraunces (Headings) and Onest (Body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Onest:wght@100..900&display=swap"
        rel="stylesheet">

    <!-- Styles -->
  <script type="module" crossorigin src="/assets/acceso-DNYYW8l2.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/supabase-config-Dj6TfptX.js">
  <link rel="modulepreload" crossorigin href="/assets/utils-CZ9WmaiU.js">
  <link rel="stylesheet" crossorigin href="/assets/style-CvIunNDa.css">
</head>

<body class="bg-light">

    <!-- Header Navigation -->
    <header class="site-header">
        <div class="container header-inner" style="justify-content: center; position: relative;">
            <div class="logo">
                <img src="assets/images/logo_AI 4U Academy.png" alt="AI 4U Academy Logo" class="header-logo-img"
                    style="height: 40px;">
            </div>
            <div
                style="position: absolute; right: 20px; display: flex; gap: 20px; font-weight: bold; font-size: 0.85rem;">
                <a href="index.html" style="color: var(--clr-white);">INICIO</a>
                <a href="dashboard.html" style="color: var(--clr-white);">MI CUENTA</a>
                <a href="index.html#pricing" style="color: var(--clr-white);">PRECIOS</a>
            </div>
        </div>
    </header>

    <!-- Login Area -->
    <section class="login-section pattern-bg-alt"
        style="min-height: calc(100vh - 70px - 80px); display: flex; align-items: center;">
        <div class="container" style="max-width: 900px;">
            <h1 id="auth-title"
                style="font-family: var(--font-body); font-size: 1.5rem; margin-bottom: 0px; padding: 15px 20px; background: white; border-top-left-radius: 8px; border-top-right-radius: 8px; border: 1px solid var(--clr-border); border-bottom: none;">
                Acceder</h1>

            <div class="login-card"
                style="background: white; border: 1px solid var(--clr-border); border-radius: 0 0 8px 8px; padding: 30px;">
                <form id="login-form">
                    <div id="signup-fields" style="display: none;">
                        <div class="form-group" style="margin-bottom: 20px;">
                            <label for="full_name"
                                style="display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem;">Nombre
                                Completo</label>
                            <input type="text" id="full_name"
                                style="width: 100%; padding: 10px; border: 1px solid var(--clr-border); border-radius: 4px;">
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 20px;">
                        <label for="email"
                            style="display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem;">Correo
                            Electrónico</label>
                        <input type="email" id="email" required
                            style="width: 100%; padding: 10px; border: 1px solid var(--clr-border); border-radius: 4px;">
                    </div>

                    <div class="form-group" style="margin-bottom: 20px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <label for="password" style="font-weight: 600; font-size: 0.9rem;">Contraseña</label>
                            <button type="button" class="btn-text" id="toggle-password"
                                style="background: none; border: none; font-size: 0.85rem; font-weight: 600; color: var(--clr-text-main); cursor: pointer; display: flex; align-items: center; gap: 5px;">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                Ver Contraseña
                            </button>
                        </div>
                        <input type="password" id="password" required
                            style="width: 100%; padding: 10px; border: 1px solid var(--clr-border); border-radius: 4px;">
                    </div>

                    <div id="login-extras" class="form-group"
                        style="margin-bottom: 20px; display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="remember" style="width: auto; margin: 0;">
                        <label for="remember" style="font-size: 0.9rem;">Recuérdame</label>
                    </div>

                    <button type="submit" id="auth-submit" class="btn btn-primary btn-block"
                        style="background-color: #0d3b4f; border-color: #0d3b4f; padding: 12px; font-size: 1rem;">Acceder</button>

                    <div id="auth-status" style="margin-top: 15px; text-align: center; display: none;"></div>
                </form>
            </div>

            <div
                style="background: #f1f5f9; padding: 15px 20px; border: 1px solid var(--clr-border); border-top: none; border-radius: 0 0 8px 8px; display: flex; justify-content: space-between;">
                <a href="#" id="toggle-auth-mode" style="font-size: 0.9rem; color: #4b9ec4;">¿No tienes cuenta?
                    Regístrate</a>
                <a href="#" id="forgot-password-link" style="font-size: 0.9rem; color: #4b9ec4;">¿Has perdido tu
                    contraseña?</a>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="site-footer"
        style="background-color: white; border-top: 1px solid var(--clr-border); padding: 20px 0;">
        <div class="container">
            <div class="footer-bottom"
                style="display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--clr-text-muted);">
                <p>&copy; 2026 AI 4U Academy. Todos los derechos reservados.</p>
            </div>
        </div>
    </footer>

    <!-- WhatsApp Sticky Button -->
    <a href="https://wa.me/5212211173457?text=Hola%20me%20interesa%20el%20AI 4U Academy%2C%20me%20gustaría%20más%20información%20y%20saber%20como%20comprar."
        target="_blank" class="sticky-whatsapp-btn" aria-label="Contactar por WhatsApp">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"
            style="width: 32px; height: 32px;">
            <path
                d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766 0-3.181-2.587-5.771-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.984-.365-1.739-.757-2.874-2.513-2.96-2.63-.086-.115-.693-.924-.693-1.762 0-.839.435-1.25.591-1.416.155-.165.338-.207.45-.207.113 0 .225 0 .324.005.102.005.24-.038.375.285.135.323.463 1.13.502 1.21.039.079.065.171.011.281-.054.109-.081.182-.161.276-.081.094-.17.21-.242.281-.081.081-.166.17-.071.332.095.162.423.696.908 1.127.625.557 1.151.73 1.313.811.162.081.257.067.352-.043.095-.109.407-.472.515-.633.109-.162.218-.135.366-.081.148.054.939.444 1.1.524.161.081.268.121.308.188.039.067.039.39-.105.795z"
                fill="white" />
            <path
                d="M12.036 3c-4.964 0-9 4.036-9 9 0 1.587.414 3.125 1.2 4.473l-1.275 4.664 4.773-1.253A8.956 8.956 0 0012.036 21c4.963 0 9-4.037 9-9 0-4.964-4.037-9-9-9zm0 16.5c-1.442 0-2.853-.372-4.101-1.077l-.295-.165-3.047.8 1.111-3-.18-.288c-.776-1.238-1.187-2.68-1.187-4.17 0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5z"
                fill="#25D366" />
        </svg>
    </a>

</body>

</html>
