<body class="auth-body pattern-bg">

    <div class="auth-wrapper">
        <a href="index.html" class="auth-logo">
            <img src="assets/images/LOGO.png" alt="AI4U Academy Logo" style="height: 60px;">
        </a>
        
        <div class="auth-glass-card">
            <div class="auth-header">
                <h1 id="form-title">Bienvenido de nuevo</h1>
                <p id="form-subtitle">Ingresa tus credenciales para continuar</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login">Iniciar Sesión</button>
                <button class="auth-tab" id="tab-signup">Crear Cuenta</button>
            </div>

            <div class="auth-messages">
                <div id="auth-error" class="auth-alert error" style="display: none;"></div>
                <div id="auth-success" class="auth-alert success" style="display: none;"></div>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form">
                <div class="input-group">
                    <label for="login-email">Correo Electrónico</label>
                    <input type="email" id="login-email" required placeholder="tu@correo.com">
                </div>
                <div class="input-group">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <!-- <div class="forgot-password">
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div> -->
                <button type="submit" class="btn btn-primary btn-block auth-submit">Iniciar Sesión</button>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" class="auth-form" style="display: none;">
                <div class="input-group">
                    <label for="signup-name">Nombre Completo</label>
                    <input type="text" id="signup-name" required placeholder="Juan Pérez">
                </div>
                <div class="input-group">
                    <label for="signup-email">Correo Electrónico</label>
                    <input type="email" id="signup-email" required placeholder="tu@correo.com">
                </div>
                <div class="input-group">
                    <label for="signup-password">Contraseña</label>
                    <input type="password" id="signup-password" required placeholder="••••••••" minlength="6">
                </div>
                <div class="input-group">
                    <label for="signup-password-confirm">Confirmar Contraseña</label>
                    <input type="password" id="signup-password-confirm" required placeholder="••••••••" minlength="6">
                </div>
                <div class="input-group" style="flex-direction: row; align-items: start; gap: 10px; margin-bottom: 20px;">
                    <input type="checkbox" id="signup-terms" required style="margin-top: 4px;">
                    <label for="signup-terms" style="font-size: 0.85rem; font-weight: normal; margin-bottom: 0;">
                        He leído y acepto el <a href="terminos.html" target="_blank" style="color: var(--clr-primary); text-decoration: underline;">Contrato de Licencia de Uso y Términos y Condiciones</a>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary btn-block auth-submit">Crear Cuenta</button>
            </form>

            <div class="auth-divider">
                <span>O continuar con</span>
            </div>
