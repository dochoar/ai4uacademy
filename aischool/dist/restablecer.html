<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 4U Academy</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Onest:wght@100..900&display=swap"
        rel="stylesheet">

    <!-- Styles -->
  <script type="module" crossorigin src="/assets/restablecer-BFGShVXk.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/supabase-config-Dj6TfptX.js">
  <link rel="modulepreload" crossorigin href="/assets/utils-CZ9WmaiU.js">
  <link rel="stylesheet" crossorigin href="/assets/style-CvIunNDa.css">
</head>

<body class="bg-light">

    <!-- Header Navigation -->
    <header class="site-header">
        <div class="container header-inner" style="justify-content: center; position: relative;">
            <div class="logo">
                <a href="index.html">
                    <img src="assets/images/logo_AI 4U Academy.png" alt="AI 4U Academy Logo" class="header-logo-img"
                        style="height: 40px;">
                </a>
            </div>
        </div>
    </header>

    <!-- Login Area -->
    <section class="login-section pattern-bg-alt"
        style="min-height: calc(100vh - 70px - 80px); display: flex; align-items: center;">
        <div class="container" style="max-width: 900px;">
            <h1 id="auth-title"
                style="font-family: var(--font-body); font-size: 1.5rem; margin-bottom: 0px; padding: 15px 20px; background: white; border-top-left-radius: 8px; border-top-right-radius: 8px; border: 1px solid var(--clr-border); border-bottom: none;">
                Establecer Nueva Contraseña
            </h1>

            <div class="login-card"
                style="background: white; border: 1px solid var(--clr-border); border-radius: 0 0 8px 8px; padding: 30px;">
                <form id="reset-form">
                    <div class="form-group" style="margin-bottom: 20px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <label for="new_password" style="font-weight: 600; font-size: 0.9rem;">Nueva
                                Contraseña</label>
                            <button type="button" class="btn-text" id="toggle-password"
                                style="background: none; border: none; font-size: 0.85rem; font-weight: 600; color: var(--clr-text-main); cursor: pointer; display: flex; align-items: center; gap: 5px;">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                Ver Contraseña
                            </button>
                        </div>
                        <input type="password" id="new_password" required minlength="8"
                            style="width: 100%; padding: 10px; border: 1px solid var(--clr-border); border-radius: 4px;">
                    </div>

                    <button type="submit" id="reset-submit" class="btn btn-primary btn-block"
                        style="background-color: #0d3b4f; border-color: #0d3b4f; padding: 12px; font-size: 1rem;">
                        Guardar Contraseña
                    </button>

                    <div id="reset-status" style="margin-top: 15px; text-align: center; display: none;"></div>
                </form>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="site-footer"
        style="background-color: white; border-top: 1px solid var(--clr-border); padding: 20px 0;">
        <div class="container">
            <div class="footer-bottom"
                style="display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--clr-text-muted);">
                <p>&copy; 2026 AI 4U Academy. Todos los derechos reservados.</p>
                <div class="footer-links" style="display: flex; gap: 15px;">
                    <a href="terminos.html" style="color: var(--clr-action); text-decoration: none;">Términos de
                        Servicio y Condiciones</a>
                </div>
            </div>
        </div>
    </footer>

</body>

</html>
