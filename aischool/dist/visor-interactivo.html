<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 4U Academy</title>
    <!-- Ruffle JS -->
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }

        #ruffle-container {
            width: 100vw;
            height: 100vh;
        }

        .header-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 20px;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent);
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            pointer-events: none;
            /* Let clicks pass through except on buttons */
        }

        .header-bar a,
        .header-bar button {
            pointer-events: auto;
        }

        .back-btn {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .loading {
            position: absolute;
            color: #fff;
            font-size: 1.2rem;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="header-bar">
        <a href="javascript:history.back()" class="back-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Volver
        </a>
    </div>

    <div class="loading">Cargando animación MAD...</div>
    <div id="ruffle-container"></div>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.onload = function () {
            // Get SWF URL from query params
            const urlParams = new URLSearchParams(window.location.search);
            let swfUrl = urlParams.get('swf');

            if (!swfUrl) {
                document.querySelector('.loading').textContent = 'Error: No se especificó ninguna animación en la URL.';
                return;
            }

            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById('ruffle-container');
            container.appendChild(player);

            // Configure player to stretch
            player.style.width = '100%';
            player.style.height = '100%';

            player.load(swfUrl).then(() => {
                document.querySelector('.loading').style.display = 'none';
            }).catch((err) => {
                console.error("Ruffle load error:", err);
                document.querySelector('.loading').textContent = 'Error al cargar la animación.';
            });
        };
    </script>
    <!-- WhatsApp Sticky Button -->
    <a href="https://wa.me/5212211173457?text=Hola%20me%20interesa%20el%20AI 4U Academy%2C%20me%20gustaría%20más%20información%20y%20saber%20como%20comprar." target="_blank" class="sticky-whatsapp-btn" aria-label="Contactar por WhatsApp">

</html>
